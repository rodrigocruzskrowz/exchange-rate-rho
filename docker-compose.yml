services:
  exchange-rate-api:
    build: .
    container_name: exchange-rate-api
    ports:
      - "8080:8080"
    environment:
      EXCHANGERATE_ACCESS_KEY: ${EXCHANGERATE_ACCESS_KEY}
      JWT_BASE64_SECRET: ${JWT_BASE64_SECRET}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3